[build]
  command = "CI=false npm run build"
  publish = "build"

# ── Production (main branch) ──────────────────────────────────────────────────
[context.production]
  environment = { REACT_APP_ENV = "production", REACT_APP_MENU_URL = "https://menu.comensaia.com" }

# ── Staging (staging branch) ──────────────────────────────────────────────────
[context.staging]
  environment = { REACT_APP_ENV = "staging", REACT_APP_MENU_URL = "https://menu-staging.comensaia.com" }

# ── Feature branches / PRs ────────────────────────────────────────────────────
[context.deploy-preview]
  environment = { REACT_APP_ENV = "preview" }

[context.branch-deploy]
  environment = { REACT_APP_ENV = "preview" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
